<meta charset="UTF-8">

<title>emoji</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #e0e0e0;
    --muted: #555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }

  h1 {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .search-wrap {
    position: relative;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }

  .colon-l, .colon-r {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
    pointer-events: none;
  }
  .colon-l { left: 14px; }
  .colon-r { right: 14px; }

  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    padding: 12px 36px;
    outline: none;
    transition: border-color 0.15s;
    border-radius: 2px;
  }
  input::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }

  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); border-color: #444; }
  .tab.active { border-color: var(--accent); color: var(--accent); }

  .count {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-align: right;
    max-width: 560px;
    width: 100%;
    margin-bottom: 10px;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 0 6px;
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
    gap: 5px;
    width: 100%;
    max-width: 560px;
    max-height: 460px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .grid::-webkit-scrollbar { width: 4px; }
  .grid::-webkit-scrollbar-track { background: transparent; }
  .grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 8px 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 2px;
    transition: border-color 0.1s, background 0.1s;
  }
  .item:hover { border-color: var(--accent); background: #222; }
  .item:active { background: #282828; }

  .emoji { font-size: 24px; line-height: 1; }
  .code {
    font-size: 7.5px;
    color: var(--muted);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    padding: 0 2px;
  }

  .toast {
    position: fixed;
    top: 24px;
    right: 24px;
    transform: translateX(140px);
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border-radius: 2px;
    opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { transform: translateX(0); opacity: 1; }

  .empty {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-align: center;
    padding: 40px 0;
    grid-column: 1 / -1;
  }
</style>
</head>

const ALL = SECTIONS.flatMap(s => s.items.map(item => [item[0], item[1], item[2], s.id]));

const grid = document.getElementById('grid');
const input = document.getElementById('q');
const countEl = document.getElementById('count');
const toast = document.getElementById('toast');
const tabsEl = document.getElementById('tabs');
let toastTimer;
let activeTab = 'all';

// Вкладки
const allTab = document.createElement('button');
allTab.className = 'tab active';
allTab.textContent = '✦ все';
allTab.dataset.id = 'all';
tabsEl.appendChild(allTab);
SECTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.textContent = s.label;
  btn.dataset.id = s.id;
  tabsEl.appendChild(btn);
});

tabsEl.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeTab = tab.dataset.id;
  render(input.value);
});

function itemHTML(emoji, code) {
  return `<div class="item" data-emoji="${emoji}" title=":${code}:"><span class="emoji">${emoji}</span><span class="code">${code}</span></div>`;
}

function render(query) {
  const q = query.replace(/:/g, '').toLowerCase().trim();

  if (q) {
    const results = ALL.filter(([,code,ru]) => code.includes(q) || (ru && ru.includes(q)));
    countEl.textContent = results.length + ' emoji';
    grid.innerHTML = results.length
      ? results.map(([e,c]) => itemHTML(e,c)).join('')
      : '<div class="empty">ничего не найдено</div>';
    return;
  }

  const sections = activeTab === 'all' ? SECTIONS : SECTIONS.filter(s => s.id === activeTab);
  let total = 0, html = '';
  sections.forEach(s => {
    html += `<div class="section-label">${s.label}</div>`;
    html += s.items.map(([e,c]) => itemHTML(e,c)).join('');
    total += s.items.length;
  });
  countEl.textContent = total + ' emoji';
  grid.innerHTML = html;
}

function copyText(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

grid.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (!item) return;
  const emoji = item.dataset.emoji;
  copyText(emoji);
  clearTimeout(toastTimer);
  toast.textContent = emoji + '  скопировано';
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
});

input.addEventListener('input', e => render(e.target.value));
render('');
</script>
