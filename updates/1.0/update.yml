name: 'BarsikCMD 1.0'
description:
  - 'BarsikCMD 1.0 - первый релиз'
  - 'Полный список изменений: https://github.com/barsik0396/BarsikCMD/blob/main/CHANGELOG.md'
version: 1.0
license: 'https://github.com/barsik0396/BarsikCMD/blob/main/LICENSE'
scripts:
  windows:
    - '[ECHO] Выполняется обновление до версии 1.0...'
    - '[DOWNLOAD-FILE] https://github.com/barsik0396/BarsikCMD/releases/download/1.0/BarsikCMD-1.0-InnoSetup-installer.exe'
    - '[RUN-FILE] "BarsikCMD-1.0-InnoSetup-installer.exe" /VERYSILENT /ALLUSERS'
    - '[END]'
  macos:
    - '[ERROR] Невозможно обновится, если у вас стоит MacOS!'
    - '[END-FAILED]'
  linux:
    Ubuntu:
      - '[ERROR] Возможность обновления на системе Ubuntu разрабатывается, но ещё не готова!'
      - '[END-FAILED]'
    LM:
      - '[ERROR] Возможность обновления на системе Linux Mint разрабатывается, но ещё не готова!'
      - '[END-FAILED]'
    Other:
      - '[ERROR] Неизвестный линукс: %l'
      - '[END-FAILED]'